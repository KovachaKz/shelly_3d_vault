    <meta charset="UTF-8" />

    <title>Shelly Variants • Three.js</title>
    <style>
      :root { --ui-bg: rgba(24,24,24,.8); --ui-border: rgba(255,255,255,.12); }
      html, body { height: 100%; }
      body { margin: 0; overflow: hidden; background: #111; color: #eee; font: 14px/1.4 system-ui, sans-serif; }
      /* Base panel look */
.panel {
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 14px;
  backdrop-filter: blur(6px);
  box-shadow: 0 10px 30px rgba(0,0,0,.35);
}

/* Bottom-center selector */
.panel-select {
  position: fixed;
  left: 50%;
  bottom: 32px;
  transform: translateX(-50%);
  padding: 14px 18px;
  z-index: 10;
  min-width: 540px;
  max-width: 70vw;
}
.panel-title {
  font-size: 14px;
  opacity: .85;
  margin: 0 0 8px;
}

/* Large, pill-style dropdown (matches your mockup) */
.select-lg {
  width: 100%;
  font-size: 18px;
  font-weight: 600;
  padding: 14px 18px;
  border-radius: 14px;
  background: #1f1f1f;
  color: #e5e7eb;
  border: 1px solid var(--ui-border);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}

/* Right-side controls panel */
.panel-controls {
  position: fixed;
  top: 50%;
  right: 24px;
  transform: translateY(-50%);
  padding: 12px;
  z-index: 11;
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 150px; /* tweak to taste */
  max-height: 80vh;
  overflow-y: auto;
}

/* Buttons + pressed state */
.btn {
  background: #1f1f1f;
  color: #eee;
  border: 1px solid var(--ui-border);
  border-radius: 10px;
  padding: 10px 12px;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s ease;
}
.btn:hover {
  background: #2a2a2a;
}
.btn[aria-pressed="true"] {
  outline: 2px solid rgba(102, 204, 238, .6);
}

/* Separator line in panel */
.panel-separator {
  height: 1px;
  background: var(--ui-border);
  margin: 6px 0;
}

/* Modal overlay for shortcuts */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal.active {
  display: flex;
}
.modal-content {
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 14px;
  padding: 24px;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
  backdrop-filter: blur(6px);
}
.modal-header {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-close {
  background: none;
  border: none;
  color: #eee;
  font-size: 24px;
  cursor: pointer;
  padding: 0;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover {
  color: #fff;
}
.shortcuts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.shortcut-item {
  display: flex;
  flex-direction: column;
}
.shortcut-key {
  font-family: monospace;
  background: #1f1f1f;
  border: 1px solid var(--ui-border);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 4px;
  text-align: center;
}
.shortcut-desc {
  font-size: 12px;
  opacity: 0.85;
  line-height: 1.3;
}

/* Status text */
.status {
  margin-top: 6px;
  font-size: 12px;
  opacity: .75;
}

/* Mobile tweak: stack bottom panel tighter */
@media (max-width: 720px) {
  .panel-select { min-width: auto; width: 92vw; bottom: 20px; }
  .panel-controls { right: 12px; width: 132px; }
}

<!-- Bottom-center: device selection only -->
<div class="panel panel-select" id="panelSelect">
  <div class="panel-title">Shelly Models</div>
  <div class="row">
    <select id="variant" class="select-lg">
      <optgroup label="Shelly Devices">
        <option value="plus1pm">Shelly Plus 1PM</option>
        <option value="plus2pm" selected>Shelly Plus 2PM</option>
        <option value="plusi4">Shelly Plus I4</option>
        <option value="duorgbw">Shelly Duo RGBW</option>
        <option value="pro1">Shelly Pro 1</option>
        <option value="pro1pm">Shelly Pro 1PM</option>
        <option value="pro2pm">Shelly Pro 2PM</option>
        <option value="pro1dimmer">Shelly Pro Dimmer1PM</option>
        <option value="pro3em">Shelly Pro 3EM</option>
      </optgroup>
      <optgroup label="3D Parts & Accessories">
        <option value="wallstand45">Wall Display Stand 45°</option>
        <option value="wallstandflat">Wall Display Stand Flat</option>
        <option value="wallfastener">Wall Fastener</option>
        <option value="wallfastenerhigh">Wall Fastener High</option>
        <option value="shelly_trv">Shelly TRV</option>
        <option value="sensor_magnet">Sensor Magnet</option>
        <option value="sensor_up">Sensor Up</option>
        <option value="sensor_down">Sensor Down</option>
        <option value="sensor_left">Sensor Left</option>
        <option value="sensor_right">Sensor Right</option>
        <option value="magnet">Magnet</option>
      </optgroup>
    </select>
  </div>
</div>


    <!-- Right side: view/control buttons + status -->
<div class="panel panel-controls" id="panelControls">
  <button id="recenter" class="btn">Re-center</button>
  <button id="btnAuto" class="btn" aria-pressed="false">Auto</button>
  <button id="btnBg" class="btn" aria-pressed="true">Background</button>
  <button id="btnGrid" class="btn" aria-pressed="false">Grid</button>
  <div class="panel-separator"></div>
  <button id="btnShortcuts" class="btn" title="View keyboard shortcuts">Shortcuts</button>
  <button id="btnDownload" class="btn" title="Download model">Download</button>
  <button id="btnInfo" class="btn" title="Model information">Info</button>
  <div id="status" class="status"> </div>
</div>

<!-- Shortcuts Modal -->
<div class="modal" id="shortcutsModal">
  <div class="modal-content">
    <div class="modal-header">
      <span>Shortcuts & Controls</span>
      <button class="modal-close" id="closeShortcuts">&times;</button>
    </div>
    <div class="shortcuts-grid">
      <div class="shortcut-item">
        <div class="shortcut-key">Left Mouse</div>
        <div class="shortcut-desc">Rotate view</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-key">Right Mouse</div>
        <div class="shortcut-desc">Pan view</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-key">Scroll</div>
        <div class="shortcut-desc">Zoom in/out</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-key">Re-center</div>
        <div class="shortcut-desc">Reset camera</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-key">Auto</div>
        <div class="shortcut-desc">Toggle rotation</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-key">Background</div>
        <div class="shortcut-desc">Toggle background</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-key">Grid</div>
        <div class="shortcut-desc">Toggle grid</div>
      </div>
      <div class="shortcut-item">
        <div class="shortcut-key">Download</div>
        <div class="shortcut-desc">Save model file</div>
      </div>
    </div>
  </div>
</div>

<!-- Info Modal -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <div class="modal-header">
      <span>Model Information</span>
      <button class="modal-close" id="closeInfo">&times;</button>
    </div>
    <div id="infoContent" style="font-size: 13px; line-height: 1.6; opacity: 0.9;">
      <p><strong>Model:</strong> <span id="infoModel">-</span></p>
      <p><strong>File:</strong> <span id="infoFile">-</span></p>
      <p><strong>Scale:</strong> <span id="infoScale">-</span></p>
      <p><strong>Vertices:</strong> <span id="infoVertices">-</span></p>
      <p><strong>Description:</strong></p>
      <p id="infoDescription" style="font-size: 12px; opacity: 0.8;">Loading...</p>
    </div>
  </div>
</div>
